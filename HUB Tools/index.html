<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Tools Baltics</title>
    <link rel="icon" type="image/png" href="assets/company/by-logo-simple-blue.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <div class="search-hub-container">

            <div class="image-placeholder-area">
                <img id="hubLogo" src="assets/company/by-logo-simple-blue.png" alt="Logo" />
            </div>

            <input type="text" id="searchInput" placeholder="Buscar herramienta o función...">

            <div class="theme-switch-container">
                <svg class="theme-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="5"/>
                    <rect x="11" y="1" width="2" height="3" rx="1"/>
                    <rect x="11" y="20" width="2" height="3" rx="1"/>
                    <rect x="1" y="11" width="3" height="2" rx="1"/>
                    <rect x="20" y="11" width="3" height="2" rx="1"/>
                    <rect x="3.5" y="3.5" width="2" height="3" rx="1" transform="rotate(45 3.5 3.5)"/>
                    <rect x="18.5" y="3.5" width="2" height="3" rx="1" transform="rotate(-45 18.5 3.5)"/>
                    <rect x="3.5" y="20.5" width="2" height="3" rx="1" transform="rotate(-45 3.5 20.5)"/>
                    <rect x="18.5" y="20.5" width="2" height="3" rx="1" transform="rotate(45 18.5 20.5)"/>
                </svg>
                <label class="switch">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider round"></span>
                </label>
                <svg class="theme-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
                </svg>
            </div>

        </div>
    </header>

    <main>
        <div class="tool-grid" id="toolGrid">
            <div class="no-results" id="noResults">
                No se encontraron herramientas que coincidan.
            </div>
        </div>
    </main>

    <script src="js/hub.js"></script>

</body>
</html>
